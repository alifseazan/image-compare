<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compare</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
    --input-bg: #1e1e1e;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--muted); font-style: normal; font-size: 12px; }

  /* ── SETUP PANEL ── */
  #setup {
    width: 100%;
    max-width: 780px;
    padding: 40px 24px;
  }

  .panel-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .inputs-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input-group label span {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .label-a span { background: #ff6b6b; }
  .label-b span { background: #6bffc4; }

  .input-group input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 11px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus { border-color: var(--accent); }
  .input-group input::placeholder { color: var(--muted); }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button {
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: none;
    outline: none;
    font-size: 12px;
    letter-spacing: 0.05em;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #0d0d0d;
    padding: 11px 28px;
    font-weight: 500;
  }
  .btn-primary:hover { background: #d4eb30; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 11px 18px;
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .error-msg {
    font-size: 11px;
    color: #ff6b6b;
    margin-top: 10px;
    min-height: 16px;
  }

  /* ── VIEWER ── */
  #viewer { display: none; width: 100%; flex-direction: column; align-items: center; }

  .viewer-toolbar {
    width: 100%;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }

  .toolbar-left { display: flex; gap: 8px; align-items: center; }
  .toolbar-right { display: flex; gap: 8px; align-items: center; }

  .tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    color: #0d0d0d;
  }
  .tag-a { background: #ff6b6b; }
  .tag-b { background: #6bffc4; }

  .url-display {
    font-size: 10px;
    color: var(--muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── COMPARE WIDGET ── */
  .compare-wrap {
    position: relative;
    width: 100%;
    max-width: 1100px;
    margin: 28px auto;
    padding: 0 24px;
  }

  #compare-container {
    position: relative;
    width: 100%;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: col-resize;
    user-select: none;
    background: #111;
    touch-action: none;
  }

  #img-b {
    display: block;
    width: 100%;
    height: auto;
    pointer-events: none;
    min-height: 200px;
    object-fit: cover;
  }

  #img-a-wrapper {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    overflow: hidden;
  }

  #img-a {
    display: block;
    height: 100%;
    max-width: none;
    pointer-events: none;
    object-fit: cover;
  }

  /* divider */
  #divider {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #fff;
    transform: translateX(-50%);
    pointer-events: none;
  }
  #divider::before, #divider::after {
    content: '';
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: rgba(255,255,255,0.2);
  }
  #divider::before { top: 0; bottom: calc(50% + 28px); }
  #divider::after  { top: calc(50% + 28px); bottom: 0; }

  #handle {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    pointer-events: none;
    flex-shrink: 0;
  }
  #handle svg { width: 18px; height: 18px; }

  /* labels on image */
  .img-label {
    position: absolute;
    top: 16px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    color: #0d0d0d;
    pointer-events: none;
    opacity: 0.9;
  }
  .img-label-a { left: 16px; background: #ff6b6b; }
  .img-label-b { right: 16px; background: #6bffc4; }

  /* ── EMBED PANEL ── */
  #embed-panel {
    display: none;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto 28px;
    padding: 0 24px;
  }

  .embed-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
  }

  .embed-box h3 {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .embed-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    background: var(--input-bg);
    padding: 3px;
    border-radius: 6px;
    width: fit-content;
  }

  .embed-tab {
    padding: 6px 14px;
    font-size: 11px;
    background: transparent;
    color: var(--muted);
    border-radius: 4px;
    letter-spacing: 0.06em;
    border: none;
  }
  .embed-tab.active { background: var(--border); color: var(--text); }

  .embed-code-wrap { position: relative; }

  .embed-code {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: #6bffc4;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 14px;
    border-radius: 6px;
    resize: none;
    line-height: 1.6;
    outline: none;
    white-space: pre;
    overflow-x: auto;
  }

  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--border);
    color: var(--text);
    padding: 5px 12px;
    font-size: 10px;
    letter-spacing: 0.08em;
    border-radius: 4px;
  }
  .copy-btn:hover { background: #3a3a3a; }
  .copy-btn.copied { background: var(--accent); color: #0d0d0d; }

  /* ── LOADING OVERLAY ── */
  #loader {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,13,13,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }
  #loader.show { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .inputs-row { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    #setup { padding: 28px 16px; }
    .viewer-toolbar { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Compare<span> // image diff tool</span></div>
  <button class="btn-ghost" id="btn-reset" style="display:none">← New</button>
</header>

<!-- SETUP -->
<div id="setup">
  <div class="panel-title">// load images via url</div>
  <div class="inputs-row">
    <div class="input-group">
      <label class="label-a"><span></span>Before — Image A</label>
      <input type="text" id="url-a" placeholder="https://example.com/before.jpg" />
    </div>
    <div class="input-group">
      <label class="label-b"><span></span>After — Image B</label>
      <input type="text" id="url-b" placeholder="https://example.com/after.jpg" />
    </div>
  </div>
  <div class="actions">
    <button class="btn-primary" id="btn-compare">Compare →</button>
    <button class="btn-ghost" id="btn-demo">Load Demo</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <div class="viewer-toolbar">
    <div class="toolbar-left">
      <span class="tag tag-a">A</span>
      <span class="url-display" id="disp-a"></span>
      <span style="color:var(--border);margin:0 4px">|</span>
      <span class="tag tag-b">B</span>
      <span class="url-display" id="disp-b"></span>
    </div>
    <div class="toolbar-right">
      <button class="btn-ghost" id="btn-embed-toggle">{ } Embed</button>
    </div>
  </div>

  <!-- embed panel -->
  <div id="embed-panel">
    <div class="embed-box">
      <h3>// embed this comparison</h3>
      <div class="embed-tabs">
        <button class="embed-tab active" data-tab="iframe">iframe</button>
        <button class="embed-tab" data-tab="link">share link</button>
      </div>
      <div class="embed-code-wrap">
        <textarea class="embed-code" id="embed-code" rows="4" readonly></textarea>
        <button class="copy-btn" id="copy-btn">copy</button>
      </div>
    </div>
  </div>

  <div class="compare-wrap">
    <div id="compare-container">
      <img id="img-b" src="" alt="After" crossorigin="anonymous" />
      <div id="img-a-wrapper">
        <img id="img-a" src="" alt="Before" crossorigin="anonymous" />
      </div>
      <div id="divider">
        <div id="handle">
          <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round">
            <path d="M8 5l-4 7 4 7M16 5l4 7-4 7"/>
          </svg>
        </div>
      </div>
      <span class="img-label img-label-a">Before</span>
      <span class="img-label img-label-b">After</span>
    </div>
  </div>
</div>

<div id="loader"><div class="spinner"></div><div class="loader-text">Loading images...</div></div>

<script>
const DEMO_A = 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/PNG_transparency_demonstration_1.png/280px-PNG_transparency_demonstration_1.png';
const DEMO_B = 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Bikesgray.jpg/320px-Bikesgray.jpg';

// ── ELEMENTS ──
const setup      = document.getElementById('setup');
const viewer     = document.getElementById('viewer');
const urlA       = document.getElementById('url-a');
const urlB       = document.getElementById('url-b');
const imgA       = document.getElementById('img-a');
const imgB       = document.getElementById('img-b');
const wrapA      = document.getElementById('img-a-wrapper');
const divider    = document.getElementById('divider');
const container  = document.getElementById('compare-container');
const errorMsg   = document.getElementById('error-msg');
const loader     = document.getElementById('loader');
const embedPanel = document.getElementById('embed-panel');
const embedCode  = document.getElementById('embed-code');
const copyBtn    = document.getElementById('copy-btn');
const dispA      = document.getElementById('disp-a');
const dispB      = document.getElementById('disp-b');
const btnReset   = document.getElementById('btn-reset');

let sliderPct = 50;
let dragging = false;

// ── URL PARAMS (for embed auto-load) ──
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return { a: p.get('a'), b: p.get('b') };
}

// ── EMBED URL BUILDER ──
function buildShareURL(a, b) {
  const base = window.location.origin + window.location.pathname;
  return `${base}?a=${encodeURIComponent(a)}&b=${encodeURIComponent(b)}`;
}
function buildIframe(a, b) {
  const url = buildShareURL(a, b);
  return `<iframe src="${url}" width="100%" height="600" style="border:none;border-radius:10px;" allowfullscreen></iframe>`;
}

// ── SLIDER LOGIC ──
function setSlider(pct) {
  sliderPct = Math.max(0, Math.min(100, pct));
  const containerW = container.offsetWidth;
  const px = (sliderPct / 100) * containerW;
  wrapA.style.width = px + 'px';
  divider.style.left = px + 'px';
  imgA.style.width = containerW + 'px';
}

function getEventX(e) {
  if (e.touches && e.touches.length) return e.touches[0].clientX;
  return e.clientX;
}

container.addEventListener('mousedown', startDrag);
container.addEventListener('touchstart', startDrag, { passive: true });
window.addEventListener('mousemove', onDrag);
window.addEventListener('touchmove', onDrag, { passive: false });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('touchend', () => dragging = false);

function startDrag(e) {
  dragging = true;
  onDrag(e);
}
function onDrag(e) {
  if (!dragging) return;
  if (e.cancelable) e.preventDefault();
  const rect = container.getBoundingClientRect();
  const x = getEventX(e) - rect.left;
  setSlider((x / rect.width) * 100);
}
window.addEventListener('resize', () => setSlider(sliderPct));

// ── LOAD IMAGES ──
function proxyUrl(url) {
  // Try to handle common CORS issues by using a proxy approach
  return url;
}

function loadImages(a, b) {
  loader.classList.add('show');
  errorMsg.textContent = '';

  let loadedCount = 0;
  let failed = false;

  function onLoad() {
    loadedCount++;
    if (loadedCount === 2) {
      loader.classList.remove('show');
      showViewer(a, b);
    }
  }

  function onError(which) {
    if (failed) return;
    failed = true;
    loader.classList.remove('show');
    errorMsg.textContent = `⚠ Failed to load Image ${which}. Check the URL or CORS policy.`;
  }

  imgA.onload = onLoad;
  imgA.onerror = () => onError('A');
  imgB.onload = onLoad;
  imgB.onerror = () => onError('B');

  imgA.src = a;
  imgB.src = b;
}

function showViewer(a, b) {
  setup.style.display = 'none';
  btnReset.style.display = 'block';
  viewer.style.display = 'flex';
  dispA.textContent = a.replace(/^https?:\/\//, '');
  dispB.textContent = b.replace(/^https?:\/\//, '');

  // sync img-a height to img-b rendered height
  setTimeout(() => {
    imgA.style.height = imgB.offsetHeight + 'px';
    setSlider(50);
  }, 50);

  updateEmbedCode('iframe', a, b);
}

// ── EMBED ──
let currentTab = 'iframe';

document.querySelectorAll('.embed-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.embed-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    const a = urlA.value.trim(), b = urlB.value.trim();
    updateEmbedCode(currentTab, a, b);
  });
});

function updateEmbedCode(tab, a, b) {
  if (tab === 'iframe') {
    embedCode.value = buildIframe(a, b);
    embedCode.rows = 3;
  } else {
    embedCode.value = buildShareURL(a, b);
    embedCode.rows = 2;
  }
}

document.getElementById('btn-embed-toggle').addEventListener('click', () => {
  const open = embedPanel.style.display === 'block';
  embedPanel.style.display = open ? 'none' : 'block';
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(embedCode.value).then(() => {
    copyBtn.textContent = '✓ copied';
    copyBtn.classList.add('copied');
    setTimeout(() => { copyBtn.textContent = 'copy'; copyBtn.classList.remove('copied'); }, 2000);
  });
});

// ── COMPARE BUTTON ──
document.getElementById('btn-compare').addEventListener('click', () => {
  const a = urlA.value.trim(), b = urlB.value.trim();
  if (!a || !b) { errorMsg.textContent = '⚠ Please enter both image URLs.'; return; }
  loadImages(a, b);
});

// ── DEMO ──
document.getElementById('btn-demo').addEventListener('click', () => {
  urlA.value = 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80';
  urlB.value = 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=900&q=80';
  errorMsg.textContent = '';
});

// ── RESET ──
btnReset.addEventListener('click', () => {
  viewer.style.display = 'none';
  embedPanel.style.display = 'none';
  setup.style.display = 'block';
  btnReset.style.display = 'none';
  imgA.src = ''; imgB.src = '';
  history.replaceState(null, '', window.location.pathname);
});

// ── ENTER KEY ──
[urlA, urlB].forEach(el => el.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-compare').click();
}));

// ── AUTO-LOAD FROM URL PARAMS ──
(function () {
  const { a, b } = getParams();
  if (a && b) {
    urlA.value = a;
    urlB.value = b;
    loadImages(a, b);
  }
})();
</script>
</body>
</html>
